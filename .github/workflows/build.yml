name: Build TrollInstallerX (no-VPN)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install ldid (needed to re-sign the patched PersistenceHelper)
        run: brew install ldid

      # ── Extract kernelcaches for A9/A10 devices (iOS 15.8.7 / 15.8.8) ──
      # iPhone 8 (A10) and iPhone 7 (A9) on iOS 15.8.x use LZSS-compressed
      # kernelcaches in their IPSWs. The extraction script uses Python zipfile
      # (ZIP64-safe) + macOS system compression framework to decompress into raw Mach-O.
      - name: Extract kernelcache: iPhone8,1 / 15.8.7
        run: |
          python3 tools/extract_ipsw_kernelcache.py \
            --ipsw "https://updates.cdn-apple.com/2025FallFCS/fullrestores/047-95429/C8FE847C-FE0E-49B1-9C7E-F56894B6E2BF/iPhone_4.7_15.8.7_19H411_Restore.ipsw" \
            --out "kernelcaches/iPhone8,1_15.8.7/kernelcache" \
            || echo "WARNING: iPhone8,1/15.8.7 kernelcache extraction failed"

      - name: Extract kernelcache: iPhone8,1 / 15.8.8
        run: |
          python3 tools/extract_ipsw_kernelcache.py \
            --ipsw "https://updates.cdn-apple.com/2025FallFCS/fullrestores/122-77510/5D4563BF-445C-4D8D-AF56-0BAC336265F3/iPhone_4.7_15.8.8_19H422_Restore.ipsw" \
            --out "kernelcaches/iPhone8,1_15.8.8/kernelcache" \
            || echo "WARNING: iPhone8,1/15.8.8 kernelcache extraction failed"

      - name: Extract kernelcache: iPhone7,1 / 15.8.7 (A9)
        run: |
          python3 tools/extract_ipsw_kernelcache.py \
            --ipsw "https://updates.cdn-apple.com/2025FallFCS/fullrestores/047-95429/C8FE847C-FE0E-49B1-9C7E-F56894B6E2BF/iPhone_4.7_15.8.7_19H411_Restore.ipsw" \
            --device "iPhone7,1" --version "15.8.7" \
            --out "kernelcaches/iPhone7,1_15.8.7/kernelcache" \
            || echo "WARNING: iPhone7,1/15.8.7 kernelcache extraction failed"

      - name: Extract kernelcache: iPhone7,1 / 15.8.8 (A9)
        run: |
          python3 tools/extract_ipsw_kernelcache.py \
            --ipsw "https://updates.cdn-apple.com/2025FallFCS/fullrestores/122-77510/5D4563BF-445C-4D8D-AF56-0BAC336265F3/iPhone_4.7_15.8.8_19H422_Restore.ipsw" \
            --device "iPhone7,1" --version "15.8.8" \
            --out "kernelcaches/iPhone7,1_15.8.8/kernelcache" \
            || echo "WARNING: iPhone7,1/15.8.8 kernelcache extraction failed"

      # Show what we got
      - name: List extracted kernelcaches
        run: find kernelcaches -name "kernelcache" -exec ls -lh {} \; 2>/dev/null || echo "No kernelcaches found"

      - name: Build IPA (no-VPN fork)
        run: bash build.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollInstallerX-novpn
          path: TrollInstallerX.ipa
          if-no-files-found: error
