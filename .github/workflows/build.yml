name: Build TrollInstallerX (no-VPN)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No git submodules needed: exploit code (libxpf, kfd, dmaFail, MacDirtyCow)
      # is vendored under TrollInstallerX/External and TrollInstallerX/Exploitation.

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build IPA (no-VPN fork)
        run: bash build.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollInstallerX-novpn
          path: TrollInstallerX.ipa
          if-no-files-found: error
